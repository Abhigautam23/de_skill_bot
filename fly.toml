# fly.io configuration for the DE Quiz Telegram bot.
#
# IMPORTANT: this is a long-polling Telegram bot, not an HTTP service.
#  - There is NO [http_service] block — fly will not try to route HTTP traffic.
#  - The bot MUST run as exactly ONE machine. Telegram only allows one
#    `getUpdates` poller per bot token; multiple machines will fight and
#    every one of them will fail with "Conflict: terminated by other
#    getUpdates request" (we hit this during local dev).
#
# After deploy, ensure single-instance with:
#     fly scale count 1
#
# Set secrets BEFORE first deploy (do NOT bake them into the image):
#     fly secrets set TELEGRAM_BOT_TOKEN="..."
#     fly secrets set TELEGRAM_USER_ID="..."
#     fly secrets set SUPABASE_URL="..."
#     fly secrets set SUPABASE_KEY="..."
#     fly secrets set ANTHROPIC_API_KEY="..."
#     fly secrets set QUIZ_TIME_1="10:00" QUIZ_TIME_2="13:30" QUIZ_TIME_3="18:00"

app = "de-skill-bot-abhi"
primary_region = "lhr"

[build]
  # Uses the Dockerfile in this directory.

[deploy]
  strategy = "immediate"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
