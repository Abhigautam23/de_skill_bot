# fly.toml app configuration file generated for de-skill-bot on 2026-05-15T23:48:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'de-skill-bot'
primary_region = 'lhr'

[build]

[deploy]
  strategy = 'immediate'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
